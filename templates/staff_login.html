<!DOCTYPE html>
<html>

<head>

<title>Staff Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">



<!-- HEADER -->

<header class="bg-black text-white p-4 text-center">

<img src="/static/images/logo.png"
width="90"
class="mx-auto mb-2">

<h1 class="text-2xl font-bold">

Staff Login

</h1>

</header>



<!-- LOGIN FORM -->

<section class="p-10">

<div class="bg-white p-6 shadow max-w-sm mx-auto">

<h2 class="text-xl text-center mb-4">

Sahyadri Staff Panel

</h2>



<form action="/login" method="post">



<label>Username</label>

<input name="username"
class="border w-full p-2 mb-3">



<label>Password</label>

<input type="password"
name="password"
class="border w-full p-2 mb-3">



<button class="bg-black text-white w-full p-2">

Login

</button>


</form>

<br>

<p class="text-center text-gray-500">

Only Staff Allowed

</p>

</div>

</section>



</body>

</html>
